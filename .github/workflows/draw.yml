name: Draw ZMK keymaps
on:
  workflow_dispatch:
  push:
    paths:
      - "config/rodeoman.keymap"
      - "boards/shields/rodeoman/rodeoman.dtsi"
jobs:
  draw:
    uses: caksoylar/keymap-drawer/.github/workflows/draw-zmk.yml@main
    permissions:
      contents: write
    with:
      keymap_patterns: "config/rodeoman.keymap"
      output_folder: "keymap-drawer"
